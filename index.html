<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Profile Card</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --text-color: #333;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .profile-card {
            background-color: var(--card-bg);
            border-radius: 15px;
            box-shadow: var(--shadow);
            width: 320px;
            padding: 30px;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .profile-card:hover {
            transform: translateY(-5px);
        }

        .image-container {
            width: 120px;
            height: 120px;
            margin: 0 auto 20px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary-color), #50e3c2);
            display: flex;
            justify-content: center;
            align-items: center;
            border: 4px solid #fff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .image-placeholder {
            font-size: 50px;
            color: white;
            font-weight: bold;
        }

        .name {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-color);
            margin: 10px 0 5px;
        }

        .stream {
            font-size: 14px;
            font-weight: 600;
            color: var(--primary-color);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
        }

        .bio {
            font-size: 15px;
            color: #666;
            line-height: 1.6;
            margin: 0;
        }

        .divider {
            height: 2px;
            width: 50px;
            background-color: var(--primary-color);
            margin: 15px auto;
            border-radius: 1px;
        }
    </style>
</head>
<body>

    <div class="profile-card">
        <div class="image-container">
            <div class="image-placeholder">JD</div>
        </div>
        <div class="name">Jane Doe</div>
        <div class="stream">Computer Science & Engineering</div>
        <div class="divider"></div>
        <p class="bio">
            Passionate software developer in training. Love building interactive web experiences and exploring machine learning. Always curious and eager to learn new technologies.
        </p>
    </div>

</body>
</html>
